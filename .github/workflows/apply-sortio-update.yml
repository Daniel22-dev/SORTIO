name: Apply merged SORTIO update

on:
  push:
    branches: [main]
    paths:
      - '.sortio-update/**'
      - '.github/workflows/apply-sortio-update.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sortio-one-time-update
  cancel-in-progress: false

jobs:
  apply:
    name: Apply, validate and publish update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct and apply merged patch
        shell: bash
        run: |
          set -euo pipefail
          cat .sortio-update/part-* | base64 --decode > /tmp/sortio-update.patch.gz
          echo '7ec039638179561698579ed7ebd66e19ce67d589985cbb20b409757203b6cd70  /tmp/sortio-update.patch.gz' | sha256sum -c -
          gzip -dc /tmp/sortio-update.patch.gz > /tmp/sortio-update.patch
          patch --batch --forward -p1 < /tmp/sortio-update.patch
          rm -rf qa-results .sortio-update

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Validate merged version
        run: |
          npm test
          npm run test:internal
          npm run build
          npm run qa:technical
          npm run qa:security
          npm run qa:pwa

      - name: Commit merged version to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-sortio-update.yml
          git config user.name 'SORTIO Update Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Sloučit auditní opravy a vylepšení SORTIO 1.0.2'
          git push origin main

      - name: Start standard QA and deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
