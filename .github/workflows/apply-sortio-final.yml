name: Publish final SORTIO 1.0.2

on:
  push:
    branches: [main]
    paths:
      - '.sortio-v2/READY'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sortio-final-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Apply, test and publish final version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct and apply verified Git patch
        shell: bash
        run: |
          set -euo pipefail
          cat .sortio-v2/part-* | base64 --decode > /tmp/sortio-final.patch.gz
          echo '85ec0e94e2ce0c155ae640a9c77ee6390aae0e4e219c32bf98229b06fb06c5f1  /tmp/sortio-final.patch.gz' | sha256sum -c -
          gzip -dc /tmp/sortio-final.patch.gz > /tmp/sortio-final.patch
          git apply --check --binary /tmp/sortio-final.patch
          git apply --binary /tmp/sortio-final.patch

      - name: Remove temporary publishing files
        shell: bash
        run: |
          rm -rf .sortio-v2 .sortio-final .sortio-update
          rm -f .github/workflows/apply-sortio-final.yml
          rm -f .github/workflows/apply-sortio-update.yml

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Validate final version
        run: |
          npm test
          npm run test:internal
          npm run build
          npm run qa:technical
          npm run qa:security
          npm run qa:pwa

      - name: Commit final version to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'SORTIO Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'SORTIO 1.0.2 – sloučená a ověřená produkční verze'
          git push origin main

      - name: Start standard QA and deploy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
