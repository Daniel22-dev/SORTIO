name: Enable and diagnose GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages-enable.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  issues: write

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment files
        id: files
        shell: bash
        run: |
          set -e
          test -f dist/index.html
          echo "count=$(find dist -type f | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Enable Pages and publish result
        uses: actions/github-script@v7
        env:
          FILE_COUNT: ${{ steps.files.outputs.count }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const report = [];
            report.push(`# SORTIO Pages diagnostic`);
            report.push(`Commit: \`${context.sha}\``);
            report.push(`Files in dist: ${process.env.FILE_COUNT}`);
            let page;
            try {
              const result = await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              page = result.data;
              report.push(`Pages existed: yes`);
              report.push(`Build type before: ${page.build_type || 'unknown'}`);
              report.push(`URL: ${page.html_url || 'not assigned'}`);
            } catch (error) {
              report.push(`Pages existed: no (${error.status || 'unknown'})`);
              try {
                const result = await github.request('POST /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  build_type: 'workflow'
                });
                page = result.data;
                report.push(`Pages creation: success`);
                report.push(`URL: ${page.html_url || 'not assigned'}`);
              } catch (createError) {
                report.push(`Pages creation: failed`);
                report.push(`Status: ${createError.status || 'unknown'}`);
                report.push(`Message: ${createError.message}`);
              }
            }
            if (page && page.build_type !== 'workflow') {
              try {
                await github.request('PUT /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  build_type: 'workflow'
                });
                report.push(`Switch to workflow build: success`);
              } catch (updateError) {
                report.push(`Switch to workflow build: failed`);
                report.push(`Status: ${updateError.status || 'unknown'}`);
                report.push(`Message: ${updateError.message}`);
              }
            }
            const title = 'SORTIO Pages diagnostic';
            const body = report.join('\n\n');
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open' });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

