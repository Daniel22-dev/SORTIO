name: SORTIO QA and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Test and build SORTIO
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --no-fund --no-audit
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org

      - name: Run production and domain tests
        run: npm test

      - name: Run internal regression suite
        run: npm run test:internal

      - name: Build production files
        run: npm run build

      - name: Run deterministic QA gates
        shell: bash
        run: |
          set -euo pipefail
          npm run qa:technical
          npm run qa:security
          npm run qa:pwa
          npm run qa:combinatorial

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke test
        run: npm run test:headless

      - name: Upload QA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results
          path: qa-results
          if-no-files-found: warn

      - name: Verify prepared build and AI Studio manifest
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          test -f dist/sw.js
          test -f dist/studio-manifest.json
          node -e "const p=require('./package.json'); const m=require('./dist/studio-manifest.json'); if(m.id!=='sortio'||m.version!==p.version||!m.launchUrl) process.exit(1)"
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Publish SORTIO
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
