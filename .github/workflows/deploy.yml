name: SORTIO Verify and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SORTIO_CI_MODE: deterministic

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Verify and publish SORTIO
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify production structure
        run: node scripts/verify-structure.mjs

      - name: Run production and domain tests
        shell: bash
        run: |
          set -euo pipefail
          node scripts/domain-tests.mjs
          node scripts/package3-runtime-tests.mjs
          node scripts/package4-runtime-tests.mjs
          node scripts/package5-runtime-tests.mjs

      - name: Build production files
        run: node scripts/build.mjs

      - name: Run internal regression suite
        run: node scripts/package5-internal-tests.mjs

      - name: Run deterministic QA gates
        shell: bash
        run: |
          set -euo pipefail
          node scripts/qa-technical.mjs
          node scripts/qa-security.mjs
          node scripts/qa-pwa.mjs
          node scripts/qa-combinatorial.mjs

      - name: Verify prepared build
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          test -f dist/sw.js
          test -f dist/studio-manifest.json
          node -e "const p=require('./package.json'); const m=require('./dist/studio-manifest.json'); if(m.id!=='sortio'||m.version!==p.version||!m.launchUrl) process.exit(1)"
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
