name: Diagnose latest SORTIO deployment

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-latest-deploy.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect latest deployment failure
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await new Promise(resolve => setTimeout(resolve, 30000));

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 50
            });

            const deployRuns = runs
              .filter(run => run.name === 'Deploy SORTIO to GitHub Pages')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const failed = deployRuns.find(run => run.conclusion === 'failure') || deployRuns[0];

            const report = ['# SORTIO deployment diagnostic'];
            if (!failed) {
              report.push('No deployment run found.');
            } else {
              report.push(`Run ID: ${failed.id}`);
              report.push(`Run number: ${failed.run_number}`);
              report.push(`Conclusion: ${failed.conclusion}`);
              report.push(`Commit: ${failed.head_sha}`);
              report.push(`URL: ${failed.html_url}`);

              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner,
                repo,
                run_id: failed.id,
                per_page: 100
              });
              for (const job of jobs) {
                report.push(`\n## Job: ${job.name}`);
                report.push(`Job ID: ${job.id}`);
                report.push(`Conclusion: ${job.conclusion}`);
                report.push('```text');
                for (const step of job.steps || []) {
                  report.push(`${step.number}. ${step.name}: ${step.conclusion}`);
                }
                report.push('```');
              }
            }

            try {
              const pages = await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              report.push('\n## GitHub Pages');
              report.push(`Status: configured`);
              report.push(`Build type: ${pages.data.build_type || 'unknown'}`);
              report.push(`URL: ${pages.data.html_url || 'unknown'}`);
            } catch (error) {
              report.push('\n## GitHub Pages');
              report.push(`Status: unavailable`);
              report.push(`HTTP: ${error.status || 'unknown'}`);
              report.push(`Message: ${error.message}`);
            }

            const title = 'SORTIO latest deployment diagnostic';
            const body = report.join('\n\n');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }
