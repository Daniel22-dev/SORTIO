name: SORTIO CI Diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Run diagnostic commands
        id: diagnostic
        shell: bash
        run: |
          set +e
          : > ci-diagnostic.log
          : > ci-status.env

          run_step() {
            label="$1"
            shift
            echo "===== ${label} =====" | tee -a ci-diagnostic.log
            "$@" 2>&1 | tee -a ci-diagnostic.log
            code=${PIPESTATUS[0]}
            key=$(echo "$label" | tr '[:lower:] -' '[:upper:]__' | tr -cd 'A-Z0-9_')
            echo "${key}=${code}" >> ci-status.env
            echo "exit=${code}" | tee -a ci-diagnostic.log
            return 0
          }

          run_step "npm ci" npm ci --no-fund
          if grep -q '^NPM_CI=0$' ci-status.env; then
            run_step "playwright install" npx playwright install --with-deps chromium
            run_step "build" npm run build
            run_step "qa release" npm run qa:release
          fi

          {
            echo '# SORTIO CI diagnostic'
            echo
            echo 'Commit: `'$GITHUB_SHA'`'
            echo
            echo '## Exit codes'
            echo '```text'
            cat ci-status.env
            echo '```'
            echo
            echo '## Log tail'
            echo '```text'
            tail -n 300 ci-diagnostic.log
            echo '```'
          } > CI-DIAGNOSTIC.md

      - name: Publish diagnostic issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('CI-DIAGNOSTIC.md', 'utf8');
            const title = 'SORTIO CI diagnostic';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-diagnostic'
            });
            if (issues.length) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-diagnostic']
              });
            }
