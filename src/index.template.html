<!doctype html>
<html lang="cs" data-ghrab-access="checking" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <title>SORTIO · Organizátor třídy</title>
  <meta name="theme-color" content="#07101f">
  <meta name="application-name" content="SORTIO">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SORTIO">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/AI-Studio-GHRAB/access/access-gate.css">
  <style>html[data-ghrab-access="checking"] body{visibility:hidden}</style>
  <style>/*==SORTIO_STYLES==*/</style>
</head>
<body>
  <!--==SORTIO_BODY==-->
  <script type="application/ghrab-protected" data-ghrab-protected>/*==SORTIO_JS==*/</script>
  <script type="module" data-ghrab-access-bootstrap>
    const APP_ID='sortio';
    function fail(title='Přístup nelze ověřit',message='Centrální přístupová služba není dostupná. Otevřete aplikaci znovu přes AI Studio GHRAB.'){
      document.documentElement.dataset.ghrabAccess='denied';document.body.style.visibility='visible';
      document.body.innerHTML='<main class="ghrab-access-gate"><div class="ghrab-access-gate-mark">◉</div><p class="ghrab-access-gate-eyebrow">AI STUDIO GHRAB</p><h1>'+title+'</h1><p>'+message+'</p><div class="ghrab-access-gate-actions"><a class="ghrab-access-gate-primary" href="/AI-Studio-GHRAB/">Otevřít AI Studio</a></div></main>';
    }
    try{
      const {protectApp}=await import('/AI-Studio-GHRAB/access/app-guard.js');let permit=null;
      document.addEventListener('ghrab:app-access-granted',event=>{permit=event.detail?.permit||null},{once:true});
      const allowed=await protectApp(APP_ID,{studioUrl:'/AI-Studio-GHRAB/'});
      if(!allowed) fail('Přístup nebyl povolen','SORTIO není pro tento účet nebo zařízení odemčena. Zkontrolujte oprávnění v AI Studiu.');
      else{
        window.__GHRAB_STUDIO_ACCESS__=Object.freeze({appId:APP_ID,permit});
        for(const source of [...document.querySelectorAll('script[type="application/ghrab-protected"]')]){
          const executable=document.createElement('script');executable.textContent=source.textContent;source.replaceWith(executable);
        }
      }
    }catch(error){console.error('SORTIO access bootstrap failed',error);fail()}
  </script>
  <noscript><style>html[data-ghrab-access="checking"] body{visibility:visible}</style><main style="max-width:42rem;margin:4rem auto;padding:1.5rem;font-family:system-ui">SORTIO vyžaduje JavaScript a platný přístup z AI Studia GHRAB.</main></noscript>
</body></html>
